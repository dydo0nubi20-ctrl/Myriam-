name: setrize
description: "Instagram-like app with an integrated Creator Studio (camera, video/photo editing, music, stickers, face detection, upload)."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # ── State management ──────────────────────────────────────────────
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5

  # ── Navigation ─────────────────────────────────────────────────────
  go_router: ^14.2.7

  # ── Camera ─────────────────────────────────────────────────────────
  camerawesome: ^2.1.0

  # ── Video editing / export ────────────────────────────────────────
  video_editor_2: ^3.1.0
  pro_video_editor: ^1.13.0
  easy_video_editor: ^0.1.6
  video_player: ^2.9.2
  chewie: ^1.8.5

  # ── Audio ──────────────────────────────────────────────────────────
  just_audio: ^0.9.40
  audio_waveforms: ^1.0.5
  record: ^5.1.2

  # ── Gallery / media ────────────────────────────────────────────────
  wechat_assets_picker: ^9.3.0
  photo_manager: ^3.0.0

  # ── Persistence (drafts) ──────────────────────────────────────────
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # ── Upload ─────────────────────────────────────────────────────────
  background_downloader: ^9.5.4
  dio: ^5.7.0

  # ── AI / Face ──────────────────────────────────────────────────────
  google_mlkit_face_detection: ^0.12.0

  # ── Text / stickers / emoji / GIF ─────────────────────────────────
  detectable_text_field: ^3.0.2
  emoji_picker_flutter: ^3.1.0
  giphy_get: ^4.0.0

  # ── Permissions ─────────────────────────────────────────────────────
  permission_handler: ^11.3.1

  # ── Models / utils ─────────────────────────────────────────────────
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  uuid: ^4.5.1
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  drift_dev: ^2.20.0
  riverpod_generator: ^2.6.3
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
